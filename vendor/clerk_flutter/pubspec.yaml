name: clerk_flutter
description: Package that will allow you to authenticate and use Clerk from Flutter code.
version: 0.0.18-beta
homepage: https://clerk.com
repository: https://github.com/clerk-community/clerk-sdk-flutter/tree/main/packages/clerk_flutter
documentation: https://docs.page/clerk-community/clerk-sdk-flutter
issue_tracker: https://github.com/clerk-community/clerk-sdk-flutter/labels/clerk_flutter
topics:
  - authentication


environment:
  sdk: '>=3.6.2 <4.0.0'
  flutter: '>=3.27.4'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  clerk_auth: 0.0.18-beta
  collection: '>=1.17.1 <2.0.0'
  email_validator: ^3.0.0
  flutter_svg: ^2.0.10+1
  http: ^1.1.0
  image_picker: ^1.0.7
  intl: '>=0.18.0 <1.0.0'
  passkeys: ^2.17.4
  path_provider: ^2.1.2
  phone_input: ^1.0.0
  url_launcher: ^6.1.14
  webview_flutter: ^4.4.3

dev_dependencies:
  coverage: ^1.15.0
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  assets:
    - assets/
